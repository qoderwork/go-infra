name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: vet / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./lifecycle/... -count=1 -race

      - name: Build examples
        run: |
          cd examples/http_server && go build ./...
          cd ../worker && go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
