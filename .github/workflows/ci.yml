name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Test lifecycle
        run: go test ./lifecycle/... -count=1 -race

      - name: Test licensing
        run: go test ./licensing/... -count=1 -race

      - name: Build license-tool
        run: go build -C cmd/license-tool -v ./...

      - name: Build examples
        run: |
          go build -C examples/http_server -v ./...
          go build -C examples/worker -v ./...
          go build -C examples/license -v ./...

      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
