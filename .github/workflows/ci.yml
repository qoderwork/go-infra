name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true # 显式启用 setup-go 的全局缓存功能

      # 删除了多余的 go vet

      - name: Test
        run: go test ./lifecycle/... -count=1 -race

      - name: Build examples
        run: |
          go build -C examples/http_server -v ./...
          go build -C examples/worker -v ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true # 统一使用 setup-go 进行依赖缓存

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          # 关键优化：跳过 action 自身的缓存，避免与 setup-go 的缓存冲突
          skip-cache: true
