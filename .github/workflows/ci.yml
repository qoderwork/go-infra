name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Test
        run: go test ./lifecycle/... -count=1 -race

      - name: Build examples
        run: |
          go build -C examples/http_server -v ./...
          go build -C examples/worker -v ./...


  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
